version: "3.9"

services:
  weather-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: weather-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/weather.db
      - Jwt__Key=${JWT_KEY:-CHANGE-ME-TO-A-32-CHAR-SECRET-KEY!!}
      - Jwt__Issuer=WeatherService
      - Jwt__Audience=WeatherServiceClients
      - Jwt__ExpiryHours=8
      - ExternalApis__OpenWeatherMap__ApiKey=${OWM_API_KEY:-your_api_key_here}
    volumes:
      - weather-data:/app/data
      - weather-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  weather-data:
  weather-logs:
